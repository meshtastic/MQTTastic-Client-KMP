name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Library version
      description: Which version of mqtt-client are you using?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: kotlin-version
    attributes:
      label: Kotlin version
      placeholder: "2.3.20"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which target platform(s) are affected?
      multiple: true
      options:
        - JVM
        - Android
        - iOS (iosArm64)
        - iOS Simulator (iosSimulatorArm64)
        - macOS (macosArm64)
        - Linux (linuxX64)
        - Linux (linuxArm64)
        - Windows (mingwX64)
        - Browser (wasmJs)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code snippet or steps to reproduce the issue.
      render: kotlin
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or stack traces.
      render: text
    validations:
      required: true
